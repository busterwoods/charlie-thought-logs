<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Normalize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">

  <title>Sign In | Thought Logs</title>
</head>

<body class="bb-page bb-auth-page">
  <main class="bb-auth-shell">
    <div class="bb-auth-split">
      <section class="bb-auth-hero" aria-label="Thought Logs intro">
        <p class="bb-kicker">Thought Logs</p>
        <h1>Welcome back</h1>
        <p>Explore the world of one man's mindless rambling.</p>
      </section>

      <section class="bb-auth-card" aria-labelledby="loginHeading">
        <section class="bb-auth-panel-clean">
          <h2 id="loginHeading" class="bb-login-title mb-4">Log in</h2>

          <form id="loginForm" novalidate>
            <div class="mb-3">
              <input id="userBox" type="text" class="form-control bb-login-input" autocomplete="username"
                placeholder="Email or username" required>
            </div>

            <div class="mb-3">
              <input id="passBox" type="password" class="form-control bb-login-input" autocomplete="current-password"
                placeholder="Password" required>
            </div>

            <div class="d-grid mb-3">
              <button id="loginBtn" type="submit" class="btn bb-login-btn">LOG IN</button>
            </div>
          </form>
          <p id="authMsg" class="small text-secondary mb-0 text-center" aria-live="polite">Ready.</p>
        </section>
      </section>
    </div>
  </main>

  <!-- Bootstrap JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Shared Auth Guard -->
  <script src="../assets/js/auth-guard.js"></script>

  <!-- Auth Page JS -->
  <script src="../assets/js/auth.js"></script>

</body>

</html>
