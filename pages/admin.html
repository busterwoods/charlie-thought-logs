<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Normalize -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/style.css">

  <title>Admin | Thought Logs</title>
</head>

<body class="bb-page bb-admin-page">
  <div class="bb-app-shell">
    <nav class="bb-navbar">
      <div class="container bb-topbar">
        <div class="d-flex align-items-center gap-2 text-nowrap">
          <a class="btn btn-outline-dark btn-sm px-3 navbar-action-btn" href="../index.html">
            <i class="bi bi-house me-1" aria-hidden="true"></i>Home
          </a>
          <a class="btn btn-outline-dark btn-sm px-3 navbar-action-btn" href="form.html">
            <i class="bi bi-plus-circle me-1" aria-hidden="true"></i>Add Idea
          </a>
          <a class="btn btn-outline-dark btn-sm px-3 navbar-action-btn" href="admin.html">
            <i class="bi bi-shield-lock me-1" aria-hidden="true"></i>Admin
          </a>
        </div>
        <div class="bb-title-wrap flex-grow-1 text-center">
          <h1 class="bb-title m-0">Thought Logs</h1>
        </div>
        <div class="d-flex align-items-center gap-2 justify-content-end">
          <span class="bb-profile-chip text-dark">
            <i class="bi bi-person-circle me-1" aria-hidden="true"></i>
            <span id="navProfileName">User</span>
          </span>
          <button id="logoutBtn" class="btn btn-outline-dark btn-sm px-3 navbar-action-btn" type="button">
            <i class="bi bi-box-arrow-right me-1" aria-hidden="true"></i>Sign Out
          </button>
        </div>
      </div>
    </nav>

    <main class="container bb-shell pt-3 pb-4">
      <section class="bb-admin-hero">
        <div>
          <h2>Admin Dashboard</h2>
          <p class="bb-muted mb-0">For admin diagnostics and data management.</p>
        </div>
      </section>



      <div class="row g-3">
        <div class="col-12 col-lg-6">
          <section class="bb-admin-panel card h-100">
            <div class="card-header d-flex justify-content-between align-items-center gap-2">
              <h3 class="h6 mb-0">localStorage</h3>
              <button id="clearLocalAllBtn" type="button" class="btn btn-sm btn-outline-danger">Clear All Local</button>
            </div>
            <div class="card-body">
              <div id="localStorageList" class="vstack gap-2"></div>
            </div>
          </section>
        </div>

        <div class="col-12 col-lg-6">
          <section class="bb-admin-panel card h-100">
            <div class="card-header d-flex justify-content-between align-items-center gap-2">
              <h3 class="h6 mb-0">sessionStorage</h3>
              <button id="clearSessionAllBtn" type="button" class="btn btn-sm btn-outline-danger">Clear All
                Session</button>
            </div>
            <div class="card-body">
              <div id="sessionStorageList" class="vstack gap-2"></div>
            </div>
          </section>
        </div>
      </div>

      <section class="bb-admin-panel card mb-3">
        <div class="card-body">
          <h3 class="h6 mb-2">Derived User Data</h3>
          <div id="derivedInfo" class="bb-admin-grid"></div>
        </div>
      </section>

      <section class="bb-admin-panel card mt-3">
        <div class="card-header d-flex justify-content-between align-items-center gap-2">
          <h3 class="h6 mb-0">Saved Content Snapshot</h3>
          <button id="resetFromJsonBtn" type="button" class="btn btn-sm btn-outline-primary">Reload from Internal
            JSON</button>
        </div>
        <div class="card-body">
          <pre id="contentRecordsPreview" class="bb-admin-pre mb-0"></pre>
        </div>
      </section>
    </main>

    <footer class="bb-footer">
      <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
        <span class="bb-muted">Thought Logs</span>
        <a class="bb-muted" href="https://github.com/busterwoods" target="_blank">Github</a>
        <a class="bb-muted" href="https://github.com/busterwoods/charlie-thought-logs" target="_blank">Repo</a>
        <a class="bb-muted" href="https://linkedin.com/in/troy-woods-42b1b1338" target="_blank">LinkedIn</a>
        <span class="bb-muted">Idea board</span>
      </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Shared Auth Guard -->
    <script src="../assets/js/auth-guard.js"></script>

    <!-- Admin JS -->
    <script src="../assets/js/admin.js"></script>
  </div>
</body>

</html>
